<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>miniJira — Settings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="jira-navbar">
    <div class="d-flex align-items-center gap-3">
        <button class="btn btn-sm d-md-none" onclick="toggleSidebar()" style="color:var(--jira-text);"><i class="bi bi-list fs-5"></i></button>
        <a href="dashboard.html" class="jira-logo">mini<span>Jira</span></a>
    </div>
    <div></div>
    <div class="jira-nav-actions">
        <div class="jira-avatar" id="user-avatar"><span id="avatar-initials">?</span></div>
    </div>
</nav>

<aside class="jira-sidebar" id="sidebar">
    <div class="jira-sidebar-section">
        <div class="jira-sidebar-label">Navigation</div>
        <a href="dashboard.html" class="jira-sidebar-link"><i class="bi bi-grid-1x2"></i> Dashboard</a>
        <a href="board.html" class="jira-sidebar-link"><i class="bi bi-kanban"></i> Board</a>
        <a href="tasks.html" class="jira-sidebar-link"><i class="bi bi-check2-square"></i> Tasks</a>
        <a href="sprints.html" class="jira-sidebar-link"><i class="bi bi-lightning"></i> Sprints</a>
    </div>
    <div class="jira-sidebar-section">
        <div class="jira-sidebar-label">Project</div>
        <a href="members.html" class="jira-sidebar-link"><i class="bi bi-people"></i> Members</a>
        <a href="activity.html" class="jira-sidebar-link"><i class="bi bi-clock-history"></i> Activity</a>
        <a href="settings.html" class="jira-sidebar-link active"><i class="bi bi-gear"></i> Settings</a>
    </div>
</aside>

<main class="jira-main">
    <div class="jira-page-header">
        <div>
            <h1 class="jira-page-title">Project Settings</h1>
            <p class="jira-page-subtitle">Configure your project and profile</p>
        </div>
    </div>

    <div class="row g-4">
        <!-- Profile Settings -->
        <div class="col-lg-6">
            <div class="jira-card">
                <h5 style="font-weight:700; font-size:1rem; margin-bottom:20px;">Profile</h5>
                <form id="profile-form" onsubmit="handleUpdateProfile(event)">
                    <div class="jira-form-group">
                        <label class="jira-label">Name</label>
                        <input type="text" class="jira-input" id="settings-name" placeholder="Your name">
                    </div>
                    <div class="jira-form-group">
                        <label class="jira-label">Email</label>
                        <input type="email" class="jira-input" id="settings-email" placeholder="Your email" disabled>
                    </div>
                    <div class="jira-form-group">
                        <label class="jira-label">Avatar URL</label>
                        <input type="url" class="jira-input" id="settings-avatar" placeholder="https://...">
                    </div>
                    <button type="submit" class="jira-btn jira-btn-primary">
                        <i class="bi bi-check-lg"></i> Save Profile
                    </button>
                </form>
            </div>
        </div>

        <!-- Project Settings -->
        <div class="col-lg-6">
            <div class="jira-card">
                <h5 style="font-weight:700; font-size:1rem; margin-bottom:20px;">Project Details</h5>
                <form id="project-settings-form" onsubmit="handleUpdateProject(event)">
                    <div class="jira-form-group">
                        <label class="jira-label">Project Name</label>
                        <input type="text" class="jira-input" id="settings-project-name">
                    </div>
                    <div class="jira-form-group">
                        <label class="jira-label">Description</label>
                        <textarea class="jira-textarea" id="settings-project-desc"></textarea>
                    </div>
                    <button type="submit" class="jira-btn jira-btn-primary">
                        <i class="bi bi-check-lg"></i> Update Project
                    </button>
                </form>
                <hr style="border-color:var(--jira-border); margin:24px 0;">
                <h5 style="font-weight:700; font-size:1rem; color:var(--jira-danger); margin-bottom:12px;">Danger Zone</h5>
                <button class="jira-btn jira-btn-danger" onclick="confirmDeleteProject()">
                    <i class="bi bi-trash"></i> Delete Project
                </button>
            </div>
        </div>

        <!-- Change Password -->
        <div class="col-lg-6">
            <div class="jira-card">
                <h5 style="font-weight:700; font-size:1rem; margin-bottom:20px;">Change Password</h5>
                <form id="password-form" onsubmit="handleChangePassword(event)">
                    <div class="jira-form-group">
                        <label class="jira-label">Current Password</label>
                        <input type="password" class="jira-input" id="current-password" required>
                    </div>
                    <div class="jira-form-group">
                        <label class="jira-label">New Password</label>
                        <input type="password" class="jira-input" id="new-password" required minlength="8">
                    </div>
                    <div class="jira-form-group">
                        <label class="jira-label">Confirm New Password</label>
                        <input type="password" class="jira-input" id="confirm-password" required>
                    </div>
                    <button type="submit" class="jira-btn jira-btn-primary">
                        <i class="bi bi-shield-lock"></i> Update Password
                    </button>
                </form>
            </div>
        </div>

        <!-- Connected Accounts -->
        <!-- [PLACEHOLDER: OAuth Integrator will add connected accounts] -->
        <div class="col-lg-6">
            <div class="jira-card">
                <h5 style="font-weight:700; font-size:1rem; margin-bottom:20px;">Connected Accounts</h5>
                <div id="connected-accounts">
                    <div class="d-flex align-items-center justify-content-between mb-3 p-3" style="background:var(--jira-bg); border-radius:var(--jira-radius);">
                        <div class="d-flex align-items-center gap-3">
                            <i class="bi bi-google" style="font-size:1.2rem;"></i>
                            <div>
                                <div style="font-weight:600; font-size:0.85rem;">Google</div>
                                <div style="font-size:0.75rem; color:var(--jira-text-dim);">Not connected</div>
                            </div>
                        </div>
                        <button class="jira-btn jira-btn-outline jira-btn-sm" onclick="connectGoogle()">Connect</button>
                    </div>
                    <div class="d-flex align-items-center justify-content-between p-3" style="background:var(--jira-bg); border-radius:var(--jira-radius);">
                        <div class="d-flex align-items-center gap-3">
                            <i class="bi bi-github" style="font-size:1.2rem;"></i>
                            <div>
                                <div style="font-weight:600; font-size:0.85rem;">GitHub</div>
                                <div style="font-size:0.75rem; color:var(--jira-text-dim);">Not connected</div>
                            </div>
                        </div>
                        <button class="jira-btn jira-btn-outline jira-btn-sm" onclick="connectGithub()">Connect</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div class="jira-toast" id="toast"><i class="bi bi-info-circle"></i><span id="toast-message"></span></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/settings.js"></script>

</body>
</html>
