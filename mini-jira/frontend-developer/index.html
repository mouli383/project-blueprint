<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>miniJira — Login</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="jira-login-page">
    <div class="jira-login-card">
        <!-- Logo -->
        <div class="text-center mb-3">
            <span class="jira-logo" style="font-size:1.6rem;">mini<span>Jira</span></span>
        </div>
        <h2 class="jira-login-title">Welcome Back</h2>
        <p class="jira-login-subtitle">Sign in to your project workspace</p>

        <!-- ============================================= -->
        <!-- OAuth Buttons -->
        <!-- [PLACEHOLDER: OAuth Integrator will wire these] -->
        <!-- ============================================= -->
        <button class="jira-oauth-btn" id="btn-google-login" onclick="handleGoogleLogin()">
            <i class="bi bi-google"></i> Sign in with Google
        </button>
        <button class="jira-oauth-btn" id="btn-github-login" onclick="handleGithubLogin()">
            <i class="bi bi-github"></i> Sign in with GitHub
        </button>

        <div class="jira-divider">or continue with email</div>

        <!-- Login Form -->
        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="jira-form-group">
                <label class="jira-label" for="login-email">Email</label>
                <input type="email" class="jira-input" id="login-email" placeholder="you@example.com" required>
            </div>
            <div class="jira-form-group">
                <label class="jira-label" for="login-password">Password</label>
                <input type="password" class="jira-input" id="login-password" placeholder="••••••••" required>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-3">
                <label style="font-size:0.8rem; color:var(--jira-text-muted); cursor:pointer;">
                    <input type="checkbox" id="remember-me" style="margin-right:6px;"> Remember me
                </label>
                <a href="#" style="font-size:0.8rem;">Forgot password?</a>
            </div>
            <button type="submit" class="jira-btn jira-btn-primary w-100" id="btn-login">
                <i class="bi bi-box-arrow-in-right"></i> Sign In
            </button>
        </form>

        <p class="text-center mt-3" style="font-size:0.8rem; color:var(--jira-text-muted);">
            Don't have an account? <a href="register.html">Sign up</a>
        </p>
    </div>
</div>

<!-- Toast -->
<div class="jira-toast" id="toast">
    <i class="bi bi-info-circle"></i>
    <span id="toast-message">Message here</span>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- API Helper -->
<script src="js/api.js"></script>
<!-- Auth JS -->
<script src="js/auth.js"></script>

<script>
    // =====================================================
    // LOGIN HANDLER
    // [PLACEHOLDER: Backend Developer will implement actual API call]
    // =====================================================
    async function handleLogin(event) {
        event.preventDefault();
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;

        try {
            const response = await API.post('/auth/login', { email, password });
            localStorage.setItem('token', response.token);
            localStorage.setItem('user', JSON.stringify(response.user));
            window.location.href = 'dashboard.html';
        } catch (error) {
            showToast('Login failed: ' + error.message, 'error');
        }
    }

    // =====================================================
    // OAUTH HANDLERS
    // [PLACEHOLDER: OAuth Integrator will implement these]
    // =====================================================
    function handleGoogleLogin() {
        // [OAUTH INTEGRATION POINT]
        // window.location.href = '/oauth/google-login.php';
        showToast('Google OAuth will be integrated by OAuth Integrator', 'warning');
    }

    function handleGithubLogin() {
        // [OAUTH INTEGRATION POINT]
        // window.location.href = '/oauth/github-login.php';
        showToast('GitHub OAuth will be integrated by OAuth Integrator', 'warning');
    }
</script>

</body>
</html>
