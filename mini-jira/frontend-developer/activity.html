<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>miniJira — Activity</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="jira-navbar">
    <div class="d-flex align-items-center gap-3">
        <button class="btn btn-sm d-md-none" onclick="toggleSidebar()" style="color:var(--jira-text);"><i class="bi bi-list fs-5"></i></button>
        <a href="dashboard.html" class="jira-logo">mini<span>Jira</span></a>
    </div>
    <input type="text" class="jira-nav-search" placeholder="Search activity...">
    <div class="jira-nav-actions">
        <div class="jira-avatar" id="user-avatar"><span id="avatar-initials">?</span></div>
    </div>
</nav>

<aside class="jira-sidebar" id="sidebar">
    <div class="jira-sidebar-section">
        <div class="jira-sidebar-label">Navigation</div>
        <a href="dashboard.html" class="jira-sidebar-link"><i class="bi bi-grid-1x2"></i> Dashboard</a>
        <a href="board.html" class="jira-sidebar-link"><i class="bi bi-kanban"></i> Board</a>
        <a href="tasks.html" class="jira-sidebar-link"><i class="bi bi-check2-square"></i> Tasks</a>
        <a href="sprints.html" class="jira-sidebar-link"><i class="bi bi-lightning"></i> Sprints</a>
    </div>
    <div class="jira-sidebar-section">
        <div class="jira-sidebar-label">Project</div>
        <a href="members.html" class="jira-sidebar-link"><i class="bi bi-people"></i> Members</a>
        <a href="activity.html" class="jira-sidebar-link active"><i class="bi bi-clock-history"></i> Activity</a>
        <a href="settings.html" class="jira-sidebar-link"><i class="bi bi-gear"></i> Settings</a>
    </div>
</aside>

<main class="jira-main">
    <div class="jira-page-header">
        <div>
            <h1 class="jira-page-title">Activity Log</h1>
            <p class="jira-page-subtitle">Track all project changes and updates</p>
        </div>
        <div class="d-flex gap-2">
            <select class="jira-select" id="activity-filter" style="width:180px;" onchange="filterActivity(this.value)">
                <option value="">All Activity</option>
                <option value="task">Tasks</option>
                <option value="sprint">Sprints</option>
                <option value="project">Project</option>
                <option value="comment">Comments</option>
            </select>
        </div>
    </div>

    <div class="jira-card">
        <!-- [PLACEHOLDER: Activity from API/MongoDB - Backend Developer] -->
        <div id="activity-list">
            <div class="jira-loading">
                <div class="jira-spinner"></div>
            </div>
        </div>
    </div>
</main>

<div class="jira-toast" id="toast"><i class="bi bi-info-circle"></i><span id="toast-message"></span></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/activity.js"></script>

</body>
</html>
