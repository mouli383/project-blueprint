<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>miniJira — Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="jira-login-page">
    <div class="jira-login-card">
        <div class="text-center mb-3">
            <span class="jira-logo" style="font-size:1.6rem;">mini<span>Jira</span></span>
        </div>
        <h2 class="jira-login-title">Create Account</h2>
        <p class="jira-login-subtitle">Join your team's workspace</p>

        <!-- OAuth Buttons -->
        <!-- [PLACEHOLDER: OAuth Integrator will wire these] -->
        <button class="jira-oauth-btn" onclick="handleGoogleLogin()">
            <i class="bi bi-google"></i> Sign up with Google
        </button>
        <button class="jira-oauth-btn" onclick="handleGithubLogin()">
            <i class="bi bi-github"></i> Sign up with GitHub
        </button>

        <div class="jira-divider">or register with email</div>

        <form id="register-form" onsubmit="handleRegister(event)">
            <div class="jira-form-group">
                <label class="jira-label" for="reg-name">Full Name</label>
                <input type="text" class="jira-input" id="reg-name" placeholder="John Doe" required>
            </div>
            <div class="jira-form-group">
                <label class="jira-label" for="reg-email">Email</label>
                <input type="email" class="jira-input" id="reg-email" placeholder="you@example.com" required>
            </div>
            <div class="jira-form-group">
                <label class="jira-label" for="reg-password">Password</label>
                <input type="password" class="jira-input" id="reg-password" placeholder="Min 8 characters" required minlength="8">
            </div>
            <div class="jira-form-group">
                <label class="jira-label" for="reg-confirm">Confirm Password</label>
                <input type="password" class="jira-input" id="reg-confirm" placeholder="••••••••" required>
            </div>
            <button type="submit" class="jira-btn jira-btn-primary w-100">
                <i class="bi bi-person-plus"></i> Create Account
            </button>
        </form>

        <p class="text-center mt-3" style="font-size:0.8rem; color:var(--jira-text-muted);">
            Already have an account? <a href="index.html">Sign in</a>
        </p>
    </div>
</div>

<div class="jira-toast" id="toast">
    <i class="bi bi-info-circle"></i>
    <span id="toast-message"></span>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>

<script>
    async function handleRegister(event) {
        event.preventDefault();
        const name = document.getElementById('reg-name').value;
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;
        const confirm = document.getElementById('reg-confirm').value;

        if (password !== confirm) {
            showToast('Passwords do not match', 'error');
            return;
        }

        try {
            // ── [BACKEND INTEGRATION POINT] ──────────────
            // const response = await API.post('/api/auth/register', { name, email, password });
            // showToast('Account created! Redirecting...', 'success');
            // setTimeout(() => window.location.href = 'index.html', 1500);
            // ─────────────────────────────────────────────

            console.log('[Frontend] Register attempt:', { name, email });
            showToast('Registration will be connected to backend API', 'warning');

        } catch (error) {
            showToast('Registration failed: ' + error.message, 'error');
        }
    }
</script>

</body>
</html>
