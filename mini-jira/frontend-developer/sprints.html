<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>miniJira — Sprints</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="jira-navbar">
    <div class="d-flex align-items-center gap-3">
        <button class="btn btn-sm d-md-none" onclick="toggleSidebar()" style="color:var(--jira-text);"><i class="bi bi-list fs-5"></i></button>
        <a href="dashboard.html" class="jira-logo">mini<span>Jira</span></a>
    </div>
    <input type="text" class="jira-nav-search" placeholder="Search sprints...">
    <div class="jira-nav-actions">
        <button class="jira-btn jira-btn-primary jira-btn-sm" onclick="openCreateSprintModal()"><i class="bi bi-plus-lg"></i> New Sprint</button>
        <div class="jira-avatar" id="user-avatar"><span id="avatar-initials">?</span></div>
    </div>
</nav>

<aside class="jira-sidebar" id="sidebar">
    <div class="jira-sidebar-section">
        <div class="jira-sidebar-label">Navigation</div>
        <a href="dashboard.html" class="jira-sidebar-link"><i class="bi bi-grid-1x2"></i> Dashboard</a>
        <a href="board.html" class="jira-sidebar-link"><i class="bi bi-kanban"></i> Board</a>
        <a href="tasks.html" class="jira-sidebar-link"><i class="bi bi-check2-square"></i> Tasks</a>
        <a href="sprints.html" class="jira-sidebar-link active"><i class="bi bi-lightning"></i> Sprints</a>
    </div>
    <div class="jira-sidebar-section">
        <div class="jira-sidebar-label">Project</div>
        <a href="members.html" class="jira-sidebar-link"><i class="bi bi-people"></i> Members</a>
        <a href="activity.html" class="jira-sidebar-link"><i class="bi bi-clock-history"></i> Activity</a>
        <a href="settings.html" class="jira-sidebar-link"><i class="bi bi-gear"></i> Settings</a>
    </div>
</aside>

<main class="jira-main">
    <div class="jira-page-header">
        <div>
            <h1 class="jira-page-title">Sprints</h1>
            <p class="jira-page-subtitle">Manage your sprint cycles</p>
        </div>
    </div>

    <!-- [PLACEHOLDER: Sprint list from API - Backend Developer] -->
    <div id="sprints-list">
        <div class="jira-card mb-3">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h5 style="font-weight:700; font-size:1rem; margin:0;" id="sprint-name-1">Sprint 1</h5>
                    <p style="color:var(--jira-text-muted); font-size:0.8rem; margin:4px 0 0;">Goal: Complete core features</p>
                </div>
                <div class="d-flex align-items-center gap-3">
                    <span class="jira-sprint-badge jira-sprint-active">● Active</span>
                    <span style="font-size:0.8rem; color:var(--jira-text-dim);">Mar 1 – Mar 15, 2026</span>
                </div>
            </div>
            <div class="mt-3">
                <div style="background:var(--jira-bg); border-radius:4px; height:8px; overflow:hidden;">
                    <div style="background:var(--jira-accent); width:40%; height:100%; border-radius:4px; transition:width 0.5s;"></div>
                </div>
                <div class="d-flex justify-content-between mt-2" style="font-size:0.75rem; color:var(--jira-text-dim);">
                    <span>2 of 5 tasks completed</span>
                    <span>40%</span>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- Create Sprint Modal -->
<div class="jira-modal-overlay" id="create-sprint-modal">
    <div class="jira-modal">
        <div class="jira-modal-header">
            <span class="jira-modal-title">Create New Sprint</span>
            <button class="jira-modal-close" onclick="closeModal('create-sprint-modal')">&times;</button>
        </div>
        <div class="jira-modal-body">
            <form id="create-sprint-form" onsubmit="handleCreateSprint(event)">
                <div class="jira-form-group">
                    <label class="jira-label">Sprint Name</label>
                    <input type="text" class="jira-input" id="sprint-name" placeholder="e.g. Sprint 2" required>
                </div>
                <div class="jira-form-group">
                    <label class="jira-label">Goal</label>
                    <textarea class="jira-textarea" id="sprint-goal" placeholder="What's the sprint goal?"></textarea>
                </div>
                <div class="jira-form-row">
                    <div class="jira-form-group">
                        <label class="jira-label">Start Date</label>
                        <input type="date" class="jira-input" id="sprint-start" required>
                    </div>
                    <div class="jira-form-group">
                        <label class="jira-label">End Date</label>
                        <input type="date" class="jira-input" id="sprint-end" required>
                    </div>
                </div>
            </form>
        </div>
        <div class="jira-modal-footer">
            <button class="jira-btn jira-btn-outline" onclick="closeModal('create-sprint-modal')">Cancel</button>
            <button class="jira-btn jira-btn-primary" onclick="document.getElementById('create-sprint-form').requestSubmit()">
                <i class="bi bi-lightning"></i> Create Sprint
            </button>
        </div>
    </div>
</div>

<div class="jira-toast" id="toast"><i class="bi bi-info-circle"></i><span id="toast-message"></span></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/sprints.js"></script>

</body>
</html>
