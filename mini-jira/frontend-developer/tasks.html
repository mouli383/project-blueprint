<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>miniJira — Tasks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Navbar -->
<nav class="jira-navbar">
    <div class="d-flex align-items-center gap-3">
        <button class="btn btn-sm d-md-none" onclick="toggleSidebar()" style="color:var(--jira-text);"><i class="bi bi-list fs-5"></i></button>
        <a href="dashboard.html" class="jira-logo">mini<span>Jira</span></a>
    </div>
    <input type="text" class="jira-nav-search" placeholder="Search tasks..." id="global-search" onkeyup="filterTasks(this.value)">
    <div class="jira-nav-actions">
        <button class="jira-btn jira-btn-primary jira-btn-sm" onclick="openCreateTaskModal()"><i class="bi bi-plus-lg"></i> New Task</button>
        <div class="jira-avatar" id="user-avatar"><span id="avatar-initials">?</span></div>
    </div>
</nav>

<!-- Sidebar -->
<aside class="jira-sidebar" id="sidebar">
    <div class="jira-sidebar-section">
        <div class="jira-sidebar-label">Navigation</div>
        <a href="dashboard.html" class="jira-sidebar-link"><i class="bi bi-grid-1x2"></i> Dashboard</a>
        <a href="board.html" class="jira-sidebar-link"><i class="bi bi-kanban"></i> Board</a>
        <a href="tasks.html" class="jira-sidebar-link active"><i class="bi bi-check2-square"></i> Tasks</a>
        <a href="sprints.html" class="jira-sidebar-link"><i class="bi bi-lightning"></i> Sprints</a>
    </div>
    <div class="jira-sidebar-section">
        <div class="jira-sidebar-label">Project</div>
        <a href="members.html" class="jira-sidebar-link"><i class="bi bi-people"></i> Members</a>
        <a href="activity.html" class="jira-sidebar-link"><i class="bi bi-clock-history"></i> Activity</a>
        <a href="settings.html" class="jira-sidebar-link"><i class="bi bi-gear"></i> Settings</a>
    </div>
</aside>

<!-- Main Content -->
<main class="jira-main">
    <div class="jira-page-header">
        <div>
            <h1 class="jira-page-title">All Tasks</h1>
            <p class="jira-page-subtitle">View and manage all tasks in list view</p>
        </div>
        <div class="d-flex gap-2">
            <select class="jira-select" id="filter-status" style="width:140px;" onchange="applyFilters()">
                <option value="">All Status</option>
                <option value="todo">To Do</option>
                <option value="in_progress">In Progress</option>
                <option value="done">Done</option>
            </select>
            <select class="jira-select" id="filter-priority" style="width:140px;" onchange="applyFilters()">
                <option value="">All Priority</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
                <option value="critical">Critical</option>
            </select>
        </div>
    </div>

    <div class="jira-card">
        <!-- [PLACEHOLDER: Task list from API - Backend Developer] -->
        <table class="jira-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Status</th>
                    <th>Priority</th>
                    <th>Assignee</th>
                    <th>Due Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tasks-table-body">
                <tr>
                    <td colspan="7" class="text-center" style="padding:40px; color:var(--jira-text-dim);">
                        <div class="jira-spinner mx-auto mb-2"></div>
                        Loading tasks...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<div class="jira-toast" id="toast"><i class="bi bi-info-circle"></i><span id="toast-message"></span></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/tasks.js"></script>

</body>
</html>
