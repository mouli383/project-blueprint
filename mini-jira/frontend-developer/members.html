<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>miniJira — Members</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="jira-navbar">
    <div class="d-flex align-items-center gap-3">
        <button class="btn btn-sm d-md-none" onclick="toggleSidebar()" style="color:var(--jira-text);"><i class="bi bi-list fs-5"></i></button>
        <a href="dashboard.html" class="jira-logo">mini<span>Jira</span></a>
    </div>
    <input type="text" class="jira-nav-search" placeholder="Search members...">
    <div class="jira-nav-actions">
        <button class="jira-btn jira-btn-primary jira-btn-sm" onclick="openInviteModal()"><i class="bi bi-person-plus"></i> Invite</button>
        <div class="jira-avatar" id="user-avatar"><span id="avatar-initials">?</span></div>
    </div>
</nav>

<aside class="jira-sidebar" id="sidebar">
    <div class="jira-sidebar-section">
        <div class="jira-sidebar-label">Navigation</div>
        <a href="dashboard.html" class="jira-sidebar-link"><i class="bi bi-grid-1x2"></i> Dashboard</a>
        <a href="board.html" class="jira-sidebar-link"><i class="bi bi-kanban"></i> Board</a>
        <a href="tasks.html" class="jira-sidebar-link"><i class="bi bi-check2-square"></i> Tasks</a>
        <a href="sprints.html" class="jira-sidebar-link"><i class="bi bi-lightning"></i> Sprints</a>
    </div>
    <div class="jira-sidebar-section">
        <div class="jira-sidebar-label">Project</div>
        <a href="members.html" class="jira-sidebar-link active"><i class="bi bi-people"></i> Members</a>
        <a href="activity.html" class="jira-sidebar-link"><i class="bi bi-clock-history"></i> Activity</a>
        <a href="settings.html" class="jira-sidebar-link"><i class="bi bi-gear"></i> Settings</a>
    </div>
</aside>

<main class="jira-main">
    <div class="jira-page-header">
        <div>
            <h1 class="jira-page-title">Team Members</h1>
            <p class="jira-page-subtitle">Manage project members and roles</p>
        </div>
    </div>

    <div class="jira-card">
        <!-- [PLACEHOLDER: Members from API - Backend Developer] -->
        <table class="jira-table">
            <thead>
                <tr>
                    <th>Member</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Joined</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="members-table-body">
                <tr>
                    <td colspan="5" class="text-center" style="padding:40px; color:var(--jira-text-dim);">
                        <div class="jira-spinner mx-auto mb-2"></div>
                        Loading members...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<!-- Invite Modal -->
<div class="jira-modal-overlay" id="invite-modal">
    <div class="jira-modal">
        <div class="jira-modal-header">
            <span class="jira-modal-title">Invite Member</span>
            <button class="jira-modal-close" onclick="closeModal('invite-modal')">&times;</button>
        </div>
        <div class="jira-modal-body">
            <form id="invite-form" onsubmit="handleInvite(event)">
                <div class="jira-form-group">
                    <label class="jira-label">Email Address</label>
                    <input type="email" class="jira-input" id="invite-email" placeholder="colleague@example.com" required>
                </div>
                <div class="jira-form-group">
                    <label class="jira-label">Role</label>
                    <select class="jira-select" id="invite-role">
                        <option value="member">Member</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
            </form>
        </div>
        <div class="jira-modal-footer">
            <button class="jira-btn jira-btn-outline" onclick="closeModal('invite-modal')">Cancel</button>
            <button class="jira-btn jira-btn-primary" onclick="document.getElementById('invite-form').requestSubmit()">
                <i class="bi bi-send"></i> Send Invite
            </button>
        </div>
    </div>
</div>

<div class="jira-toast" id="toast"><i class="bi bi-info-circle"></i><span id="toast-message"></span></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/members.js"></script>

</body>
</html>
