<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Jira — Projects</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header"><i class="bi bi-kanban"></i><span>Mini Jira</span><button class="btn-close-sidebar d-lg-none" onclick="toggleSidebar()"><i class="bi bi-x-lg"></i></button></div>
        <ul class="sidebar-nav">
            <li><a href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li class="active"><a href="projects.html"><i class="bi bi-folder"></i> Projects</a></li>
            <li><a href="board.html"><i class="bi bi-columns-gap"></i> Board</a></li>
            <li><a href="tasks.html"><i class="bi bi-check2-square"></i> Tasks</a></li>
            <li><a href="sprints.html"><i class="bi bi-arrow-repeat"></i> Sprints</a></li>
            <li><a href="members.html"><i class="bi bi-people"></i> Members</a></li>
            <li><a href="activity.html"><i class="bi bi-clock-history"></i> Activity</a></li>
        </ul>
        <div class="sidebar-footer"><div class="user-info" onclick="toggleUserMenu()"><div class="avatar" id="avatar-initials">?</div><span id="user-display-name">User</span><i class="bi bi-box-arrow-right ms-auto"></i></div></div>
    </nav>

    <main class="main-content">
        <div class="top-bar d-lg-none"><button class="btn btn-link" onclick="toggleSidebar()"><i class="bi bi-list fs-4"></i></button><span class="fw-bold">Projects</span></div>
        <div class="content-area">
            <div class="page-header d-flex justify-content-between align-items-center">
                <div><h2><i class="bi bi-folder"></i> Projects</h2><p class="text-muted">Manage your projects</p></div>
                <button class="btn btn-primary" onclick="openModal('projectModal')"><i class="bi bi-plus-lg"></i> New Project</button>
            </div>

            <div class="row g-3" id="projectList">
                <div class="col-12 text-center text-muted py-5">Loading projects...</div>
            </div>
        </div>
    </main>

    <!-- Create Project Modal -->
    <div class="modal-overlay" id="projectModal">
        <div class="modal-box">
            <div class="modal-header"><h5>Create Project</h5><button onclick="closeModal('projectModal')" class="btn-close"></button></div>
            <form onsubmit="createProject(event)">
                <div class="mb-3"><label class="form-label">Project Name</label><input type="text" class="form-control" id="projName" required></div>
                <div class="mb-3"><label class="form-label">Project Key</label><input type="text" class="form-control" id="projKey" maxlength="5" placeholder="e.g. MJD" required></div>
                <div class="mb-3"><label class="form-label">Description</label><textarea class="form-control" id="projDesc" rows="3"></textarea></div>
                <button type="submit" class="btn btn-primary w-100">Create Project</button>
            </form>
        </div>
    </div>

    <div id="toast" class="app-toast"><span id="toast-message"></span></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/projects.js"></script>
</body>
</html>
