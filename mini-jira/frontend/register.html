<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Jira — Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo"><i class="bi bi-kanban"></i></div>
                <h1>Mini Jira</h1>
                <p class="text-muted">Create your account</p>
            </div>
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control" id="regName" placeholder="Your full name" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control" id="regEmail" placeholder="you@example.com" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="regPassword" placeholder="Min 6 characters" minlength="6" required>
                    </div>
                </div>
                <div id="regError" class="alert alert-danger d-none"></div>
                <button type="submit" class="btn btn-primary w-100" id="regBtn">
                    <span class="spinner-border spinner-border-sm d-none me-2" id="regSpinner"></span>
                    Create Account
                </button>
            </form>
            <div class="auth-footer">
                <p>Already have an account? <a href="index.html">Sign in</a></p>
            </div>
        </div>
    </div>
    <div id="toast" class="app-toast"><span id="toast-message"></span></div>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            const spinner = document.getElementById('regSpinner');
            const error = document.getElementById('regError');
            
            btn.disabled = true;
            spinner.classList.remove('d-none');
            error.classList.add('d-none');
            
            try {
                const res = await API.post('/auth.php?action=register', {
                    name: document.getElementById('regName').value,
                    email: document.getElementById('regEmail').value,
                    password: document.getElementById('regPassword').value
                });
                localStorage.setItem('token', res.token);
                localStorage.setItem('user', JSON.stringify(res.user));
                window.location.href = 'dashboard.html';
            } catch (err) {
                error.textContent = err.message || 'Registration failed';
                error.classList.remove('d-none');
            } finally {
                btn.disabled = false;
                spinner.classList.add('d-none');
            }
        }
    </script>
</body>
</html>
