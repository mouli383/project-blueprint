<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Jira — Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Sidebar -->
    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <i class="bi bi-kanban"></i>
            <span>Mini Jira</span>
            <button class="btn-close-sidebar d-lg-none" onclick="toggleSidebar()"><i class="bi bi-x-lg"></i></button>
        </div>
        <ul class="sidebar-nav">
            <li class="active"><a href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li><a href="projects.html"><i class="bi bi-folder"></i> Projects</a></li>
            <li><a href="board.html"><i class="bi bi-columns-gap"></i> Board</a></li>
            <li><a href="tasks.html"><i class="bi bi-check2-square"></i> Tasks</a></li>
            <li><a href="sprints.html"><i class="bi bi-arrow-repeat"></i> Sprints</a></li>
            <li><a href="members.html"><i class="bi bi-people"></i> Members</a></li>
            <li><a href="activity.html"><i class="bi bi-clock-history"></i> Activity</a></li>
        </ul>
        <div class="sidebar-footer">
            <div class="user-info" onclick="toggleUserMenu()">
                <div class="avatar" id="avatar-initials">AU</div>
                <span id="user-display-name">Admin User</span>
                <i class="bi bi-box-arrow-right ms-auto" title="Logout"></i>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="top-bar d-lg-none">
            <button class="btn btn-link" onclick="toggleSidebar()"><i class="bi bi-list fs-4"></i></button>
            <span class="fw-bold">Dashboard</span>
        </div>

        <div class="content-area">
            <div class="page-header">
                <h2><i class="bi bi-speedometer2"></i> Dashboard</h2>
                <p class="text-muted" id="welcome-text">Welcome back!</p>
            </div>

            <!-- Project Selector -->
            <div class="mb-4">
                <select class="form-select" id="projectSelector" onchange="switchProject()">
                    <option value="">Loading projects...</option>
                </select>
            </div>

            <!-- Stats Cards -->
            <div class="row g-3 mb-4">
                <div class="col-6 col-md-3">
                    <div class="stat-card stat-total">
                        <div class="stat-icon"><i class="bi bi-list-task"></i></div>
                        <div class="stat-value" id="statTotal">0</div>
                        <div class="stat-label">Total Tasks</div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="stat-card stat-progress">
                        <div class="stat-icon"><i class="bi bi-arrow-clockwise"></i></div>
                        <div class="stat-value" id="statProgress">0</div>
                        <div class="stat-label">In Progress</div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="stat-card stat-done">
                        <div class="stat-icon"><i class="bi bi-check-circle"></i></div>
                        <div class="stat-value" id="statDone">0</div>
                        <div class="stat-label">Done</div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="stat-card stat-members">
                        <div class="stat-icon"><i class="bi bi-people"></i></div>
                        <div class="stat-value" id="statMembers">0</div>
                        <div class="stat-label">Members</div>
                    </div>
                </div>
            </div>

            <!-- Progress Bar -->
            <div class="card mb-4">
                <div class="card-body">
                    <div class="d-flex justify-content-between mb-2">
                        <span class="fw-bold">Sprint Progress</span>
                        <span id="progressPercent">0%</span>
                    </div>
                    <div class="progress" style="height: 10px;">
                        <div class="progress-bar bg-success" id="progressBar" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div class="row g-3">
                <!-- Recent Tasks -->
                <div class="col-lg-7">
                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h6 class="mb-0"><i class="bi bi-clock"></i> Recent Tasks</h6>
                            <a href="tasks.html" class="btn btn-sm btn-outline-primary">View All</a>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead>
                                        <tr><th>Task</th><th>Status</th><th>Priority</th><th>Assignee</th></tr>
                                    </thead>
                                    <tbody id="recentTasks">
                                        <tr><td colspan="4" class="text-center text-muted py-4">Loading...</td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Recent Activity -->
                <div class="col-lg-5">
                    <div class="card">
                        <div class="card-header">
                            <h6 class="mb-0"><i class="bi bi-activity"></i> Recent Activity</h6>
                        </div>
                        <div class="card-body" id="recentActivity">
                            <p class="text-muted text-center">Loading...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="app-toast"><span id="toast-message"></span></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
