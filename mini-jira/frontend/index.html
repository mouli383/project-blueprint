<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Jira — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo"><i class="bi bi-kanban"></i></div>
                <h1>Mini Jira</h1>
                <p class="text-muted">Sign in to your account</p>
            </div>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control" id="loginEmail" placeholder="admin@minijira.com" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="loginPassword" placeholder="password123" required>
                    </div>
                </div>
                <div id="loginError" class="alert alert-danger d-none"></div>
                <button type="submit" class="btn btn-primary w-100" id="loginBtn">
                    <span class="spinner-border spinner-border-sm d-none me-2" id="loginSpinner"></span>
                    Sign In
                </button>
            </form>
            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Create one</a></p>
            </div>
        </div>
    </div>
    <div id="toast" class="app-toast"><span id="toast-message"></span></div>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const spinner = document.getElementById('loginSpinner');
            const error = document.getElementById('loginError');
            
            btn.disabled = true;
            spinner.classList.remove('d-none');
            error.classList.add('d-none');
            
            try {
                const res = await API.post('/auth.php?action=login', {
                    email: document.getElementById('loginEmail').value,
                    password: document.getElementById('loginPassword').value
                });
                localStorage.setItem('token', res.token);
                localStorage.setItem('user', JSON.stringify(res.user));
                window.location.href = 'dashboard.html';
            } catch (err) {
                error.textContent = err.message || 'Login failed';
                error.classList.remove('d-none');
            } finally {
                btn.disabled = false;
                spinner.classList.add('d-none');
            }
        }
    </script>
</body>
</html>
