<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Jira — Tasks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header"><i class="bi bi-kanban"></i><span>Mini Jira</span><button class="btn-close-sidebar d-lg-none" onclick="toggleSidebar()"><i class="bi bi-x-lg"></i></button></div>
        <ul class="sidebar-nav">
            <li><a href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li><a href="projects.html"><i class="bi bi-folder"></i> Projects</a></li>
            <li><a href="board.html"><i class="bi bi-columns-gap"></i> Board</a></li>
            <li class="active"><a href="tasks.html"><i class="bi bi-check2-square"></i> Tasks</a></li>
            <li><a href="sprints.html"><i class="bi bi-arrow-repeat"></i> Sprints</a></li>
            <li><a href="members.html"><i class="bi bi-people"></i> Members</a></li>
            <li><a href="activity.html"><i class="bi bi-clock-history"></i> Activity</a></li>
        </ul>
        <div class="sidebar-footer"><div class="user-info" onclick="toggleUserMenu()"><div class="avatar" id="avatar-initials">?</div><span id="user-display-name">User</span><i class="bi bi-box-arrow-right ms-auto"></i></div></div>
    </nav>

    <main class="main-content">
        <div class="top-bar d-lg-none"><button class="btn btn-link" onclick="toggleSidebar()"><i class="bi bi-list fs-4"></i></button><span class="fw-bold">Tasks</span></div>
        <div class="content-area">
            <div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-2">
                <div><h2><i class="bi bi-check2-square"></i> Tasks</h2></div>
                <button class="btn btn-primary" onclick="openModal('taskModal')"><i class="bi bi-plus-lg"></i> New Task</button>
            </div>

            <!-- Filters -->
            <div class="card mb-3">
                <div class="card-body d-flex gap-2 flex-wrap">
                    <select class="form-select form-select-sm" style="width:auto" id="filterStatus" onchange="loadTasks()">
                        <option value="">All Status</option>
                        <option value="todo">To Do</option>
                        <option value="in_progress">In Progress</option>
                        <option value="review">Review</option>
                        <option value="done">Done</option>
                    </select>
                    <select class="form-select form-select-sm" style="width:auto" id="filterPriority" onchange="loadTasks()">
                        <option value="">All Priority</option>
                        <option value="critical">Critical</option>
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                        <option value="low">Low</option>
                    </select>
                    <input type="text" class="form-control form-control-sm" style="width:200px" placeholder="Search tasks..." id="filterSearch" oninput="loadTasks()">
                </div>
            </div>

            <div class="card">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr><th>Type</th><th>Title</th><th>Status</th><th>Priority</th><th>Assignee</th><th>Actions</th></tr>
                            </thead>
                            <tbody id="taskList">
                                <tr><td colspan="6" class="text-center py-4 text-muted">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Create/Edit Task Modal -->
    <div class="modal-overlay" id="taskModal">
        <div class="modal-box modal-lg">
            <div class="modal-header"><h5 id="taskModalTitle">Create Task</h5><button onclick="closeModal('taskModal')" class="btn-close"></button></div>
            <form onsubmit="saveTask(event)">
                <input type="hidden" id="taskId">
                <div class="row">
                    <div class="col-md-8">
                        <div class="mb-3"><label class="form-label">Title</label><input type="text" class="form-control" id="taskTitle" required></div>
                        <div class="mb-3"><label class="form-label">Description</label><textarea class="form-control" id="taskDesc" rows="4"></textarea></div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3"><label class="form-label">Type</label>
                            <select class="form-select" id="taskType"><option value="task">Task</option><option value="story">Story</option><option value="bug">Bug</option><option value="epic">Epic</option></select>
                        </div>
                        <div class="mb-3"><label class="form-label">Priority</label>
                            <select class="form-select" id="taskPriority"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option><option value="critical">Critical</option></select>
                        </div>
                        <div class="mb-3"><label class="form-label">Status</label>
                            <select class="form-select" id="taskStatus"><option value="todo">To Do</option><option value="in_progress">In Progress</option><option value="review">Review</option><option value="done">Done</option></select>
                        </div>
                        <div class="mb-3"><label class="form-label">Assignee</label><select class="form-select" id="taskAssignee"><option value="">Unassigned</option></select></div>
                        <div class="mb-3"><label class="form-label">Sprint</label><select class="form-select" id="taskSprint"><option value="">Backlog</option></select></div>
                        <div class="mb-3"><label class="form-label">Due Date</label><input type="date" class="form-control" id="taskDue"></div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100">Save Task</button>
            </form>
        </div>
    </div>

    <!-- Task Detail Modal -->
    <div class="modal-overlay" id="taskDetailModal">
        <div class="modal-box modal-lg">
            <div class="modal-header"><h5 id="detailTitle">Task</h5><button onclick="closeModal('taskDetailModal')" class="btn-close"></button></div>
            <div id="taskDetailContent">Loading...</div>
            <div class="mt-3 border-top pt-3">
                <h6>Comments</h6>
                <div id="commentList" class="mb-3"></div>
                <form onsubmit="addComment(event)" class="d-flex gap-2">
                    <input type="hidden" id="commentTaskId">
                    <input type="text" class="form-control" id="commentInput" placeholder="Write a comment..." required>
                    <button class="btn btn-primary"><i class="bi bi-send"></i></button>
                </form>
            </div>
        </div>
    </div>

    <div id="toast" class="app-toast"><span id="toast-message"></span></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/tasks.js"></script>
</body>
</html>
