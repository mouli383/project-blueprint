<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Jira — Board</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header"><i class="bi bi-kanban"></i><span>Mini Jira</span><button class="btn-close-sidebar d-lg-none" onclick="toggleSidebar()"><i class="bi bi-x-lg"></i></button></div>
        <ul class="sidebar-nav">
            <li><a href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li><a href="projects.html"><i class="bi bi-folder"></i> Projects</a></li>
            <li class="active"><a href="board.html"><i class="bi bi-columns-gap"></i> Board</a></li>
            <li><a href="tasks.html"><i class="bi bi-check2-square"></i> Tasks</a></li>
            <li><a href="sprints.html"><i class="bi bi-arrow-repeat"></i> Sprints</a></li>
            <li><a href="members.html"><i class="bi bi-people"></i> Members</a></li>
            <li><a href="activity.html"><i class="bi bi-clock-history"></i> Activity</a></li>
        </ul>
        <div class="sidebar-footer"><div class="user-info" onclick="toggleUserMenu()"><div class="avatar" id="avatar-initials">?</div><span id="user-display-name">User</span><i class="bi bi-box-arrow-right ms-auto"></i></div></div>
    </nav>

    <main class="main-content">
        <div class="top-bar d-lg-none"><button class="btn btn-link" onclick="toggleSidebar()"><i class="bi bi-list fs-4"></i></button><span class="fw-bold">Board</span></div>
        <div class="content-area">
            <div class="page-header"><h2><i class="bi bi-columns-gap"></i> Kanban Board</h2></div>

            <div class="board-container">
                <div class="board-column" data-status="todo">
                    <div class="board-column-header bg-secondary">
                        <span>TO DO</span>
                        <span class="badge bg-light text-dark" id="countTodo">0</span>
                    </div>
                    <div class="board-column-body" id="colTodo" ondrop="dropTask(event,'todo')" ondragover="event.preventDefault()"></div>
                </div>
                <div class="board-column" data-status="in_progress">
                    <div class="board-column-header bg-primary">
                        <span>IN PROGRESS</span>
                        <span class="badge bg-light text-dark" id="countProgress">0</span>
                    </div>
                    <div class="board-column-body" id="colProgress" ondrop="dropTask(event,'in_progress')" ondragover="event.preventDefault()"></div>
                </div>
                <div class="board-column" data-status="review">
                    <div class="board-column-header bg-warning">
                        <span>REVIEW</span>
                        <span class="badge bg-light text-dark" id="countReview">0</span>
                    </div>
                    <div class="board-column-body" id="colReview" ondrop="dropTask(event,'review')" ondragover="event.preventDefault()"></div>
                </div>
                <div class="board-column" data-status="done">
                    <div class="board-column-header bg-success">
                        <span>DONE</span>
                        <span class="badge bg-light text-dark" id="countDone">0</span>
                    </div>
                    <div class="board-column-body" id="colDone" ondrop="dropTask(event,'done')" ondragover="event.preventDefault()"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="app-toast"><span id="toast-message"></span></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/board.js"></script>
</body>
</html>
